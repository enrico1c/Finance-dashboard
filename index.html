<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINTERM — Finance Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
<div class="app-shell">

  <!-- ── TOPBAR ──────────────────────────────────────────────────── -->
  <header class="topbar" id="topbar">

    <!-- ROW 1: brand · live · searches -->
    <div class="topbar-row topbar-row-1">
      <div class="brand">
        <h1>FINTERM</h1>
        <span class="brand-sub">Market Intelligence</span>
      </div>
      <div class="topbar-divider"></div>
      <span class="live-dot">Live</span>
      <div class="topbar-divider"></div>
      <div class="search-group">
        <span class="search-label">Ticker</span>
        <input id="tickerInput" placeholder="AAPL · NYSE:IBM · MIL:ENI" value="AAPL" oninput="updateExchangeHint()" />
        <button onclick="changeTicker()">Run ↵</button>
      </div>
      <span class="exchange-hint" id="exchangeHint">NASDAQ</span>
      <div class="topbar-divider"></div>
      <div class="search-group">
        <span class="search-label">Topic</span>
        <input id="topicInput" placeholder="Italy · AI · China · Fed..." />
        <button onclick="searchTopicNews()">Run ↵</button>
      </div>
      <!-- collapse button — always visible -->
      <button class="topbar-collapse-btn" id="topbarCollapseBtn" onclick="toggleTopbar()" title="Collapse/Expand">▲</button>
    </div>

    <!-- ROW 2: modules (collapsible) -->
    <div class="topbar-row topbar-row-2" id="topbarRow2">
      <span class="checklist-title">Modules</span>
      <div class="checklist">
        <label><input type="checkbox" class="panel-toggle" data-panel="chart"        checked> Chart</label>
        <label><input type="checkbox" class="panel-toggle" data-panel="forex"              > Forex</label>
        <label><input type="checkbox" class="panel-toggle" data-panel="fundamentals" checked> Fundamentals</label>
        <label><input type="checkbox" class="panel-toggle" data-panel="news"         checked> News</label>
        <label><input type="checkbox" class="panel-toggle" data-panel="notes"        checked> Notes</label>
        <label><input type="checkbox" class="panel-toggle" data-panel="comparables"  checked> Comparables</label>
      </div>
    </div>

  </header>

  <!-- ── FREE CANVAS ─────────────────────────────────────────────── -->
  <div id="dashboardCanvas">
    <div id="snapOverlay"></div>

    <!-- ▸ PRICE CHART ─────────────────────────────────────────── -->
    <section class="panel" id="panel-chart" data-panel="chart">
      <div class="panel-head">
        <div class="drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <h3>▸ Price Chart</h3>
        <div class="panel-actions">
          <button class="icon-btn close" onclick="hidePanel('chart')" title="Close">✕</button>
        </div>
      </div>
      <div id="priceChart" class="panel-content chart-content"></div>
      <!-- resize handles -->
      <div class="resize-handle" data-dir="n"></div>
      <div class="resize-handle" data-dir="s"></div>
      <div class="resize-handle" data-dir="w"></div>
      <div class="resize-handle" data-dir="e"></div>
      <div class="resize-handle" data-dir="nw"></div>
      <div class="resize-handle" data-dir="ne"></div>
      <div class="resize-handle" data-dir="sw"></div>
      <div class="resize-handle" data-dir="se"></div>
      <div class="size-tooltip" id="tooltip-chart"></div>
    </section>

    <!-- ▸ FOREX ────────────────────────────────────────────────── -->
    <section class="panel hidden" id="panel-forex" data-panel="forex">
      <div class="panel-head">
        <div class="drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <div class="panel-title-row">
          <h3>▸ Forex Chart</h3>
          <div class="mode-label" id="forexLabel">Pair: EUR/USD</div>
        </div>
        <div class="panel-actions">
          <input id="forexPairInput" class="mini-input" placeholder="EUR/USD" value="EUR/USD" />
          <button class="icon-btn" onclick="changeForexPair()" title="Load pair">↵</button>
          <button class="icon-btn close" onclick="hidePanel('forex')" title="Close">✕</button>
        </div>
      </div>
      <div class="forex-topbar">
        <button class="fx-tf-btn" onclick="setForexInterval('1')">1m</button>
        <button class="fx-tf-btn" onclick="setForexInterval('5')">5m</button>
        <button class="fx-tf-btn active" onclick="setForexInterval('60')">1H</button>
        <button class="fx-tf-btn" onclick="setForexInterval('240')">4H</button>
        <button class="fx-tf-btn" onclick="setForexInterval('D')">1D</button>
        <button class="fx-tf-btn" onclick="setForexInterval('W')">1W</button>
      </div>
      <div class="forex-summary" id="forexSummary">
        <div class="metric"><span>Pair</span><span>EUR/USD</span></div>
        <div class="metric"><span>Status</span><span>Ready</span></div>
      </div>
      <div id="forexChart" class="panel-content chart-content"></div>
      <div class="resize-handle" data-dir="n"></div>
      <div class="resize-handle" data-dir="s"></div>
      <div class="resize-handle" data-dir="w"></div>
      <div class="resize-handle" data-dir="e"></div>
      <div class="resize-handle" data-dir="nw"></div>
      <div class="resize-handle" data-dir="ne"></div>
      <div class="resize-handle" data-dir="sw"></div>
      <div class="resize-handle" data-dir="se"></div>
      <div class="size-tooltip" id="tooltip-forex"></div>
    </section>

    <!-- ▸ FUNDAMENTALS ─────────────────────────────────────────── -->
    <section class="panel" id="panel-fundamentals" data-panel="fundamentals">
      <div class="panel-head">
        <div class="drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <h3>▸ Fundamentals</h3>
        <div class="panel-actions">
          <button class="icon-btn close" onclick="hidePanel('fundamentals')" title="Close">✕</button>
        </div>
      </div>
      <div id="financials" class="panel-content"></div>
      <div class="resize-handle" data-dir="n"></div>
      <div class="resize-handle" data-dir="s"></div>
      <div class="resize-handle" data-dir="w"></div>
      <div class="resize-handle" data-dir="e"></div>
      <div class="resize-handle" data-dir="nw"></div>
      <div class="resize-handle" data-dir="ne"></div>
      <div class="resize-handle" data-dir="sw"></div>
      <div class="resize-handle" data-dir="se"></div>
      <div class="size-tooltip" id="tooltip-fundamentals"></div>
    </section>

    <!-- ▸ NEWS ─────────────────────────────────────────────────── -->
    <section class="panel" id="panel-news" data-panel="news">
      <div class="panel-head">
        <div class="drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <div class="panel-title-row">
          <h3>▸ News Hub</h3>
          <div id="newsModeLabel" class="mode-label">Mode: Ticker</div>
        </div>
        <div class="panel-actions">
          <button class="icon-btn close" onclick="hidePanel('news')" title="Close">✕</button>
        </div>
      </div>
      <div id="newsBox" class="panel-content"></div>
      <div class="resize-handle" data-dir="n"></div>
      <div class="resize-handle" data-dir="s"></div>
      <div class="resize-handle" data-dir="w"></div>
      <div class="resize-handle" data-dir="e"></div>
      <div class="resize-handle" data-dir="nw"></div>
      <div class="resize-handle" data-dir="ne"></div>
      <div class="resize-handle" data-dir="sw"></div>
      <div class="resize-handle" data-dir="se"></div>
      <div class="size-tooltip" id="tooltip-news"></div>
    </section>

    <!-- ▸ NOTES ────────────────────────────────────────────────── -->
    <section class="panel" id="panel-notes" data-panel="notes">
      <div class="panel-head">
        <div class="drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <h3>▸ Notes</h3>
        <div class="panel-actions">
          <button class="icon-btn close" onclick="hidePanel('notes')" title="Close">✕</button>
        </div>
      </div>
      <div class="panel-content">
        <textarea id="notesArea" placeholder="// target price, watchlist, ideas, links...&#10;// e.g. AAPL — buy above 185, TP 210"></textarea>
      </div>
      <div class="resize-handle" data-dir="n"></div>
      <div class="resize-handle" data-dir="s"></div>
      <div class="resize-handle" data-dir="w"></div>
      <div class="resize-handle" data-dir="e"></div>
      <div class="resize-handle" data-dir="nw"></div>
      <div class="resize-handle" data-dir="ne"></div>
      <div class="resize-handle" data-dir="sw"></div>
      <div class="resize-handle" data-dir="se"></div>
      <div class="size-tooltip" id="tooltip-notes"></div>
    </section>

    <!-- ▸ COMPARABLES ──────────────────────────────────────────── -->
    <section class="panel" id="panel-comparables" data-panel="comparables">
      <div class="panel-head">
        <div class="drag-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <h3>▸ Comparables</h3>
        <div class="panel-actions">
          <button class="icon-btn close" onclick="hidePanel('comparables')" title="Close">✕</button>
        </div>
      </div>
      <div id="peers" class="panel-content"></div>
      <div class="resize-handle" data-dir="n"></div>
      <div class="resize-handle" data-dir="s"></div>
      <div class="resize-handle" data-dir="w"></div>
      <div class="resize-handle" data-dir="e"></div>
      <div class="resize-handle" data-dir="nw"></div>
      <div class="resize-handle" data-dir="ne"></div>
      <div class="resize-handle" data-dir="sw"></div>
      <div class="resize-handle" data-dir="se"></div>
      <div class="size-tooltip" id="tooltip-comparables"></div>
    </section>

  </div><!-- /dashboardCanvas -->
</div><!-- /app-shell -->

<script src="script.js"></script>
</body>
</html>
