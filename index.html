<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

  <h1>Finance Dashboard</h1>

  <div class="search">
    <input id="tickerInput" placeholder="Ticker (AAPL, TSLA, NVDA)">
    <button onclick="changeTicker()">Search</button>
  </div>

  <div class="grid">
    <div class="chart">
      <div id="priceChart" style="height:100%; min-height:480px;"></div>
    </div>

    <div class="fundamentals">
      <h3>Fundamentals</h3>
      <div id="financials">Qui compariranno i dati fondamentali.</div>
    </div>

    <div class="news">
      <h3>News</h3>
      <div id="newsBox">Qui compariranno le news.</div>
    </div>

    <div class="analysts">
      <h3>Analyst Ratings</h3>
      <div id="analystBox">Qui compariranno i rating.</div>
    </div>

    <div class="comparables">
      <h3>Comparables</h3>
      <div id="peers">Qui compariranno i comparables.</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
