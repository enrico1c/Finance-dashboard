<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="top-left">
        <h1>Finance Dashboard</h1>

        <div class="search-row">
          <input id="tickerInput" placeholder="Ticker (AAPL, TSLA, NVDA)" value="AAPL" />
          <button onclick="changeTicker()">Search Ticker</button>

          <input id="topicInput" placeholder="Paese o tema (Italy, AI, China)" />
          <button onclick="searchTopicNews()">Search Topic News</button>
        </div>
      </div>

      <div class="top-right">
        <div class="checklist-title">Mostra/Nascondi moduli</div>

        <div class="checklist">
          <label><input type="checkbox" class="panel-toggle" data-panel="chart" checked> Chart</label>
          <label><input type="checkbox" class="panel-toggle" data-panel="forex"> Forex</label>
          <label><input type="checkbox" class="panel-toggle" data-panel="fundamentals" checked> Fundamentals</label>
          <label><input type="checkbox" class="panel-toggle" data-panel="news" checked> News</label>
          <label><input type="checkbox" class="panel-toggle" data-panel="notes" checked> Notes</label>
          <label><input type="checkbox" class="panel-toggle" data-panel="comparables" checked> Comparables</label>
        </div>
      </div>
    </header>

    <main id="dashboardGrid" class="dashboard-grid">
      <section class="panel" id="panel-chart" data-panel="chart" data-size="2">
        <div class="panel-head">
          <h3>Price Chart</h3>
          <div class="panel-actions">
            <button class="size-btn" onclick="resizePanel('chart', -1)">−</button>
            <button class="size-btn" onclick="resizePanel('chart', 1)">+</button>
          </div>
        </div>
        <div id="priceChart" class="panel-content chart-content"></div>
      </section>

      <section class="panel hidden" id="panel-forex" data-panel="forex" data-size="1">
        <div class="panel-head">
          <div>
            <h3>Forex Chart</h3>
            <div class="mode-label" id="forexLabel">Pair: EUR/USD</div>
          </div>
          <div class="panel-actions">
            <input id="forexPairInput" class="mini-input" placeholder="EUR/USD" value="EUR/USD" />
            <button class="size-btn" onclick="changeForexPair()">Load</button>
            <button class="size-btn" onclick="resizePanel('forex', -1)">−</button>
            <button class="size-btn" onclick="resizePanel('forex', 1)">+</button>
          </div>
        </div>

        <div class="forex-topbar">
          <button class="fx-tf-btn" onclick="setForexInterval('1')">1m</button>
          <button class="fx-tf-btn" onclick="setForexInterval('5')">5m</button>
          <button class="fx-tf-btn" onclick="setForexInterval('60')">1H</button>
          <button class="fx-tf-btn" onclick="setForexInterval('240')">4H</button>
          <button class="fx-tf-btn" onclick="setForexInterval('D')">D</button>
        </div>

        <div class="forex-summary" id="forexSummary">
          <div class="metric"><span>Selected Pair</span><span>EUR/USD</span></div>
          <div class="metric"><span>Status</span><span>Ready</span></div>
          <div class="metric"><span>Mode</span><span>Forex widget active</span></div>
        </div>

        <div id="forexChart" class="panel-content chart-content"></div>
      </section>

      <section class="panel" id="panel-fundamentals" data-panel="fundamentals" data-size="1">
        <div class="panel-head">
          <h3>Fundamentals</h3>
          <div class="panel-actions">
            <button class="size-btn" onclick="resizePanel('fundamentals', -1)">−</button>
            <button class="size-btn" onclick="resizePanel('fundamentals', 1)">+</button>
          </div>
        </div>
        <div id="financials" class="panel-content"></div>
      </section>

      <section class="panel" id="panel-news" data-panel="news" data-size="1">
        <div class="panel-head">
          <div>
            <h3>News Hub</h3>
            <div id="newsModeLabel" class="mode-label">Mode: Ticker News</div>
          </div>
          <div class="panel-actions">
            <button class="size-btn" onclick="resizePanel('news', -1)">−</button>
            <button class="size-btn" onclick="resizePanel('news', 1)">+</button>
          </div>
        </div>
        <div id="newsBox" class="panel-content"></div>
      </section>

      <section class="panel" id="panel-notes" data-panel="notes" data-size="1">
        <div class="panel-head">
          <h3>Notes</h3>
          <div class="panel-actions">
            <button class="size-btn" onclick="resizePanel('notes', -1)">−</button>
            <button class="size-btn" onclick="resizePanel('notes', 1)">+</button>
          </div>
        </div>
        <div class="panel-content">
          <textarea id="notesArea" placeholder="Scrivi qui note, idee, target price, link, watchlist..."></textarea>
        </div>
      </section>

      <section class="panel" id="panel-comparables" data-panel="comparables" data-size="1">
        <div class="panel-head">
          <h3>Comparables</h3>
          <div class="panel-actions">
            <button class="size-btn" onclick="resizePanel('comparables', -1)">−</button>
            <button class="size-btn" onclick="resizePanel('comparables', 1)">+</button>
          </div>
        </div>
        <div id="peers" class="panel-content"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
